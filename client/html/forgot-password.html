<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BookNTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .custom-input-group {
      margin-bottom: 20px;
    }
    .custom-input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted-dark);
    }
    .custom-input {
      width: 100%;
      background: var(--surface-dark);
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      padding: 14px 18px;
      color: white;
      transition: all 0.3s;
    }
    .custom-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
    }
  </style>
</head>
<body class="dark-mode">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card glass-panel p-4 p-md-5">
          <div class="text-center mb-4">
             <h2 class="fw-bold text-primary mb-2"><span style="color:#ffffff">Book</span><span style="color:#ff5722">N</span><span style="color:#ffffff">Travel</span></h2>
             <p class="text-muted">Reset your account password</p>
          </div>

          <form id="resetForm">
            <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
            <div id="successMsg" class="alert alert-success d-none" role="alert"></div>
            
            <div class="custom-input-group">
              <label for="email">Email Address</label>
              <input type="email" class="custom-input" id="email" placeholder="Enter your registered email" required>
            </div>
            
            <div class="custom-input-group">
              <label for="password">New Password</label>
              <div class="password-wrapper">
                <input type="password" class="custom-input" id="password" placeholder="Enter new password" required>
                <i class="bi bi-eye password-toggle" id="togglePassword"></i>
              </div>
            </div>

            <div class="custom-input-group">
              <label for="confirmPassword">Confirm New Password</label>
              <input type="password" class="custom-input" id="confirmPassword" placeholder="Confirm new password" required>
            </div>

            <button class="btn btn-primary w-100 py-3 fw-bold mb-4" type="submit" style="border-radius: 12px;">Reset Password</button>
            
            <p class="text-center mt-3">
              <a href="login.html" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // Password Toggle Logic
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      
      errorMsg.classList.add('d-none');
      successMsg.classList.add('d-none');

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match!';
        errorMsg.classList.remove('d-none');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          successMsg.textContent = 'Password updated successfully! Redirecting to login...';
          successMsg.classList.remove('d-none');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('d-none');
        }
      } catch (err) {
        errorMsg.textContent = 'Server error. Try again later.';
        errorMsg.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
