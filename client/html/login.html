<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BookNTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-split-container {
      min-height: 100vh;
      display: flex;
      background-color: var(--bg-dark);
    }
    .auth-image-side {
      flex: 1.2;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: white;
    }
    .auth-form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background-color: var(--bg-dark);
    }
    .auth-card {
      width: 100%;
      max-width: 450px;
      background: transparent;
      border: none;
    }
    .social-btn {
      border: 1px solid var(--border-dark);
      background: transparent;
      color: var(--text-dark);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      margin-bottom: 15px;
      font-weight: 500;
    }
    .social-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--primary-color);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 25px 0;
      color: var(--text-muted-dark);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-dark);
    }
    .divider:not(:empty)::before { margin-right: .75em; }
    .divider:not(:empty)::after { margin-left: .75em; }

    .custom-input-group {
      margin-bottom: 20px;
    }
    .custom-input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted-dark);
    }
    .custom-input {
      width: 100%;
      background: var(--surface-dark);
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      padding: 14px 18px;
      color: white;
      transition: all 0.3s;
    }
    .custom-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
    }
    @media (max-width: 992px) {
      .auth-image-side { display: none; }
      .auth-form-side { flex: 1; width: 100%; }
    }
  </style>
</head>
<body class="dark-mode">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card glass-panel p-4 p-md-5">
          <div class="text-center mb-4">
             <h2 class="fw-bold text-primary mb-2"><span style="color:#ffffff">Book</span><span style="color:#ff5722">N</span><span style="color:#ffffff">Travel</span></h2>
             <p class="text-muted">Sign in to your account</p>
          </div>

          <form id="loginForm">
            <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
            
            <div class="custom-input-group">
              <label for="email">Email Address</label>
              <input type="email" class="custom-input" id="email" placeholder="e.g. xyz@example.com" required>
            </div>
            
            <div class="custom-input-group">
              <label for="password">Password</label>
              <div class="password-wrapper">
                <input type="password" class="custom-input" id="password" placeholder="e.g. StrongPass#2024" required>
                <i class="bi bi-eye password-toggle" id="togglePassword"></i>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label text-muted small" for="remember">Remember me</label>
              </div>
              <a href="forgot-password.html" class="text-primary small text-decoration-none">Forgot password?</a>
            </div>

            <button class="btn btn-primary w-100 py-3 fw-bold mb-4" type="submit" style="border-radius: 12px;">Sign in</button>
            
            <p class="text-center text-muted small">
              Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Sign up for free</a>
            </p>
            <p class="text-center mt-3">
              <a href="/index.html" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // Password Toggle Logic
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('d-none');

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          setAuth(data);
          if (data.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = '/index.html';
          }
        } else {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('d-none');
        }
      } catch (err) {
        errorMsg.textContent = 'Server error. Try again later.';
        errorMsg.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
