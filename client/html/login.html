<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BookNTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary" style="min-height: 100vh;">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card glass-panel p-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary"><span class="brand-icon" style="position:relative; display:inline-block; margin-right:15px;"><i class="bi bi-globe-americas" style="color:#1a237e;"></i><i class="bi bi-airplane-fill" style="position:absolute; top:-5px; right:-15px; font-size:1.5rem; color:#ff5722; transform:rotate(45deg); filter:drop-shadow(1px 1px 1px rgba(0,0,0,0.3));"></i></span><span class="brand-logo-text"><span style="color:#1a237e">Book</span><span style="color:#ff5722">N</span><span style="color:#1a237e">Travel</span><span class="brand-tagline">Discover Happiness Around the World</span></span></h2>
            <p class="text-muted">Sign in to your account</p>
          </div>
          
          <form id="loginForm">
            <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
            
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder=" " required>
              <label for="email">Email address</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="password" placeholder=" " required>
              <label for="password">Password</label>
            </div>

            <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Sign in</button>
            <p class="text-center">Don't have an account? <a href="register.html">Sign up</a></p>
            <p class="text-center mt-3"><a href="/index.html" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Home</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('d-none');

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          setAuth(data);
          if (data.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = '/index.html';
          }
        } else {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('d-none');
        }
      } catch (err) {
        errorMsg.textContent = 'Server error. Try again later.';
        errorMsg.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
